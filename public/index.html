        width: 6px;

      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar-thumb {

  try {

    if (data.success) {

      return atob(data.encrypted);
    } else {
      alert(`❌ Blocked | Penalty: ${data.penalty}`);
      return null;
    }
  } catch (err) {
    alert("Server error");
    return null;
  }
};

        ],
      };

      function App() {
        const [passwords, setPasswords] = useState([]);
        const [newPassword, setNewPassword] = useState("");
        const [startTime, setStartTime] = useState("20:00");
        const [endTime, setEndTime] = useState("21:00");
        const [lockDays, setLockDays] = useState("90");
        const [customDays, setCustomDays] = useState("");
        const [dailyFocus, setDailyFocus] = useState("");
        const [masterLockStart, setMasterLockStart] = useState(() =>
          localStorage.getItem("master_lock"),
        );
        const [currentTime, setCurrentTime] = useState(new Date());
        const [selectedPass, setSelectedPass] = useState(null);
        const [isLoading, setIsLoading] = useState(false);
        const [serverTime, setServerTime] = useState(null);
        const [decrypted, setDecrypted] = useState(null);

        useEffect(() => {
          const fetchVault = async (showOffline = false) => {
            try {
              const response = await fetch(`${API_BASE}/${USER_ID}`);
              if (!response.ok) throw new Error("Network error");
              const data = await response.json();
              setPasswords(data.passwords || []);
              setDailyFocus(data.dailyFocus || "");
            } catch (err) {
              console.error("❌ Backend sync error:", err);
              if (showOffline) {
                alert("Offline mode. Vault data from cache. Check connection.");
              }
              // Try localStorage fallback
              const cached = localStorage.getItem("vaultCache");
              if (cached) {
                const data = JSON.parse(cached);
                setPasswords(data.passwords || []);
                setDailyFocus(data.dailyFocus || "");
              }
            }
          };
          fetchVault();
        }, []);

        useEffect(() => {
          const run = async () => {
            if (selectedPass) {
              const result = await attemptUnlock(selectedPass, selectedPass.index);
              if (result) {
                setDecrypted(result);
                selectedPass.unlocked = true;
              }
            }
          };
          run();
        }, [selectedPass]);

        useEffect(() => {
          const timer = setInterval(() => setCurrentTime(new Date()), 1000);
          return () => clearInterval(timer);
        }, []);

        // Server time cache - fetches once on load, retries every 5min
        useEffect(() => {
          const fetchServerTime = async () => {
            try {
              const response = await fetch(`${API_URL}/api/time`);
              const data = await response.json();
              setServerTime(new Date(data.datetime));
            } catch (err) {
              // Silent fail - no console spam
            }
          };
          fetchServerTime();
          const interval = setInterval(fetchServerTime, 300000); // 5min
          return () => clearInterval(interval);
        }, []);

        const dailyReason = useMemo(() => {
          const day = currentTime.getDate();
          const cats = Object.keys(REASONS);
          const cat = cats[day % cats.length];
          const quote = REASONS[cat][(day * 13) % REASONS[cat].length];
          return { cat, quote };
        }, [currentTime.getDate()]);

        const addPassword = async () => {
          if (!newPassword) return;
          setIsLoading(true);
          const payload = {
            encrypted: btoa(newPassword),
            days: customDays ? parseInt(customDays) : parseInt(lockDays),
            window: { start: startTime, end: endTime },
          };

          try {
            const response = await fetch(`${API_BASE}/${USER_ID}/add`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            if (response.ok) {
              const data = await response.json();
              setPasswords(data.passwords);
              localStorage.setItem("vaultCache", JSON.stringify(data));
              setNewPassword("");
              setCustomDays("");
              fetchVault();
            } else {
              throw new Error("Server error");
            }
          } catch (err) {
            alert("Offline. Data queued for sync.");
            localStorage.setItem("pendingSeal", JSON.stringify(payload));
          } finally {
            setIsLoading(false);
          }
        };

        const handleFocusChange = async (val) => {
          setDailyFocus(val);
          try {
            await fetch(`${API_BASE}/${USER_ID}/focus`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ dailyFocus: val }),
            });
          } catch (err) {
            console.error("Focus sync failed");
          }
        };

        const checkTimeAccess = (pass) => {
          if (!serverTime) return true; // fallback allow
          const now = serverTime.getHours() * 60 + serverTime.getMinutes();
          const [sH, sM] = pass.window.start.split(":").map(Number);
          const [eH, eM] = pass.window.end.split(":").map(Number);
          return now >= sH * 60 + sM && now <= eH * 60 + eM;
        };

        const isExpired = (pass) => {
          return new Date(pass.endDate) < new Date();
        };

        const startMasterLock = () => {
          const timestamp = new Date().toISOString();
          setMasterLockStart(timestamp);
          localStorage.setItem("master_lock", timestamp);
        };

        return (
          <div className="max-w-6xl mx-auto p-4 md:p-8 lg:p-12 fade-in">

                        )}
                        d

                <div className="glass p-6 md:p-8 rounded-[2rem] border-l-4 border-indigo-500">

                  </p>
                </div>

                <div className="glass p-6 md:p-8 rounded-[2rem]">
                  <h3 className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">
                    Today's Focus
                  </h3>
                  <textarea
                    className="w-full bg-black/30 border border-white/5 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-pink-500 outline-none h-32 md:h-40 transition-all placeholder:text-gray-700"
                    placeholder="What will you build today?"
                    value={dailyFocus}
                    onChange={(e) => handleFocusChange(e.target.value)}
                  />
                </div>
              </div>

              {/* Right: Vault System */}
              <div className="lg:col-span-2 space-y-6 md:space-y-8 order-1 lg:order-2">
                {!masterLockStart && (
                  <section className="glass p-6 md:p-10 rounded-[2.5rem] relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-pink-500/10 blur-3xl rounded-full"></div>
                    <h2 className="text-xl md:text-2xl font-bold mb-6 md:mb-8">
                      Lock New Credential
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-6 md:mb-8">
                      <div className="space-y-2">
                        <label className="text-[10px] uppercase font-bold text-gray-500 ml-2">
                          Secure Credential
                        </label>
                        <input
                          type="password"
                          placeholder="••••••••"
                          className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-pink-500 transition-all text-sm"
                          value={newPassword}
                          onChange={(e) => setNewPassword(e.target.value)}
                        />
                      </div>
                      <div className="space-y-2">
                        <label className="text-[10px] uppercase font-bold text-gray-500 ml-2">
                          Lock Duration
                        </label>
                        <div className="flex gap-2">
                          <select
                            className="bg-white/5 border border-white/10 rounded-2xl p-4 flex-1 outline-none appearance-none text-sm"
                            value={lockDays}
                            onChange={(e) => setLockDays(e.target.value)}
                          >
                            <option value="7">7 Days</option>
                            <option value="30">30 Days</option>
                            <option value="90">90 Days</option>
                            <option value="365">1 Year</option>
                          </select>
                          <input
                            type="number"
                            placeholder="Custom"
                            className="bg-white/5 border border-white/10 rounded-2xl p-4 w-20 md:w-28 outline-none text-sm"
                            value={customDays}
                            onChange={(e) => setCustomDays(e.target.value)}
                          />
                        </div>
                      </div>
                    </div>

                    <div className="bg-black/40 p-4 md:p-6 rounded-3xl border border-white/5 mb-6 md:mb-8 text-center">
                      <p className="text-[10px] uppercase font-bold text-gray-500 mb-4 tracking-widest">
                        Daily Viewing Window
                      </p>
                      <div className="flex justify-center items-center gap-4 md:gap-6">
                        <input
                          type="time"
                          value={startTime}
                          onChange={(e) => setStartTime(e.target.value)}
                          className="bg-transparent text-xl md:text-2xl font-mono outline-none text-pink-500 cursor-pointer"
                        />
                        <span className="text-gray-700 font-black">—</span>
                        <input
                          type="time"
                          value={endTime}
                          onChange={(e) => setEndTime(e.target.value)}
                          className="bg-transparent text-xl md:text-2xl font-mono outline-none text-pink-500 cursor-pointer"
                        />
                      </div>
                    </div>

                    <button
                      disabled={isLoading}
                      onClick={addPassword}
                      className="gradient-btn w-full py-4 md:py-5 rounded-2xl font-black uppercase tracking-[0.2em] md:tracking-[0.3em] text-xs md:text-sm disabled:opacity-50"

                      {isLoading ? "Syncing..." : "Seal Into Vault"}

                )}

                <section className="space-y-4">
                  <div className="flex items-center justify-between px-2 md:px-4">

                      Vault Archives
                    </h3>
                    <span className="text-[10px] md:text-xs bg-white/5 px-3 py-1 rounded-full text-gray-500">
                      {passwords.length} items
                    </span>
                  </div>
                  <div className="grid gap-4">
                    {passwords.map((pass, index) => (
                      <div
                        key={pass._id || pass.id}
                        className="glass p-6 md:p-8 rounded-[2rem] flex flex-col sm:row justify-between items-center gap-4 sm:flex-row group hover:bg-white/[0.05] transition-all"
                      >
                        <div className="text-center sm:text-left">
                          <div className="flex items-center justify-center sm:justify-start gap-2 mb-1">
                            <div className="w-2 h-2 rounded-full bg-pink-500 animate-pulse"></div>
                            <p className="text-pink-400 font-mono font-bold tracking-tighter text-xs md:text-sm">
                              WINDOW: {pass.window.start} — {pass.window.end}
                            </p>
                          </div>
                          <p className="text-[10px] text-gray-600 uppercase font-bold tracking-widest sm:ml-4">
                            Expires:{" "}
                            {new Date(pass.endDate).toLocaleDateString()}
                          </p>
                        </div>
                        <button
                          onClick={() => {
                            if (!checkTimeAccess(pass)) {
                              alert(`Outside allowed window: ${pass.window.start} — ${pass.window.end}`);
                              return;
                            }
                            setSelectedPass({ ...pass, index });
                          }}
                          className="w-full sm:w-auto bg-white/5 hover:bg-white/10 px-8 md:px-12 py-3 md:py-4 rounded-2xl font-black text-[10px] md:text-xs uppercase tracking-widest transition-all border border-white/5 group-hover:border-pink-500/50"
                        >
                          Unlock
                        </button>
                      </div>
                    ))}
                    {passwords.length === 0 && (
                      <div className="text-center py-12 md:py-20 glass rounded-[2.5rem] border-dashed border-2 border-white/5">
                        <p className="text-gray-600 font-medium italic text-sm">
                          The vault is currently empty.
                        </p>
                      </div>
                    )}
                  </div>
                </section>
              </div>
</div>

{selectedPass && (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
                <div
                  className="absolute inset-0 bg-black/95 backdrop-blur-xl"
                  onClick={() => setSelectedPass(null)}
                ></div>
                <div className="relative glass p-8 md:p-16 rounded-[2.5rem] md:rounded-[3rem] max-w-2xl w-full text-center fade-in border border-white/10 max-h-[90vh] overflow-y-auto">
                  {selectedPass.unlocked ? (
                    <div className="space-y-6 md:space-y-8">
                      <div className="inline-block p-4 rounded-full bg-green-500/10">
                        <svg
                          className="w-8 h-8 md:w-12 md:h-12 text-green-500 mx-auto"
                          fill="none"
                          stroke="currentColor"
                          viewBox="0 0 24 24"
                        >
                          <path
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            strokeWidth="2"
                            d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"
                          ></path>
                        </svg>
                      </div>
                      <h2 className="text-xl md:text-3xl font-black uppercase tracking-widest">
                        Protocol Unlocked
                      </h2>
                      <div className="bg-black/50 p-6 md:p-10 rounded-[2rem] border border-white/10 break-all">
                        <code className="text-2xl md:text-4xl font-mono text-white select-all">
                          {decrypted}
                        </code>
                      </div>
                      <button
                        onClick={() => {
                          navigator.clipboard.writeText(decrypted);
                          alert("Credential Copied.");
                        }}
                        className="gradient-btn w-full py-4 md:py-5 rounded-2xl font-black uppercase tracking-widest text-xs md:text-sm"
                      >
                        Copy to Clipboard
                      </button>
                      <button
                        onClick={() => setSelectedPass(null)}
                        className="text-gray-600 hover:text-white transition-colors uppercase text-[10px] font-black tracking-widest block w-full"
                      >
                        Seal Again
                      </button>
                    </div>
                  ) : (
                    <div className="py-4 md:py-6">
                      <h2 className="text-3xl md:text-4xl font-black mb-6 md:mb-10 tracking-tighter">
                        PAUSE.
                      </h2>
                      <p className="text-lg md:text-2xl font-light leading-relaxed text-gray-300 mb-8 md:mb-12">
                        You’re out here begging for attention from someone who
                        doesn’t care, while your dreams sit ignored. No one’s
                        coming to fix your life—get up and start building it.
                      </p>

                      <div className="bg-red-500/10 border border-red-500/20 p-4 md:p-6 rounded-2xl mb-8 md:mb-10">
                        <p className="text-[10px] text-red-500 uppercase font-bold tracking-[0.2em] mb-2">
                          Window Restricted
                        </p>
                        <p className="text-xs md:text-sm text-gray-500">
                          Viewable daily:{" "}
                          <span className="text-white font-mono">
                            {selectedPass.window.start} —{" "}
                            {selectedPass.window.end}
                          </span>
                        </p>
                      </div>

                      <button
                        onClick={() => setSelectedPass(null)}
                        className="bg-white/10 hover:bg-white/20 px-10 md:px-16 py-4 md:py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] border border-white/5 transition-all"
                      >
                        I Understand
                      </button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      }

      // PWA SW Registration
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/sw.js")
          .then((reg) => console.log("SW registered"))
          .catch((err) => console.log("SW failed", err));
      }

      // Loading progress
      let loadProgress = 0;
      const bar = document.querySelector(".loading-bar div");
      const interval = setInterval(() => {
        loadProgress += Math.random() * 10;
        if (loadProgress > 95) loadProgress = 95;
        bar.style.width = loadProgress + "%";
      }, 100);

      // Splash fade out after deps + React render
      const fadeSplash = () => {
        clearInterval(interval);
        bar.style.width = "100%";
        setTimeout(() => {
          document.getElementById("splash").style.opacity = "0";
          document.getElementById("root").style.opacity = "1";
          setTimeout(() => document.getElementById("splash").remove(), 500);
        }, 300);
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
      fadeSplash();
    </script>

    <script>
      // Bottom Nav Active State
      document.addEventListener("DOMContentLoaded", () => {
        const path = window.location.pathname;
        const vaultBtn = document.querySelector('#bottom-nav a[href="/"]');
        const graphBtn = document.querySelector('#bottom-nav a[href="/graph"]');
        if (path === "/") {
          vaultBtn?.classList.add("active");
        } else if (path === "/graph") {
          graphBtn?.classList.add("graph-active");
        }
      });
    </script>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <div class="nav-container">
        <a href="/" class="nav-btn">
          <svg
            class="nav-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span class="nav-label">Vault</span>
        </a>
        <a href="/graph" class="nav-btn">
          <svg
            class="nav-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 3v18h18V3H3z"></path>
            <path d="M12 9v8"></path>
            <path d="M9 11v6"></path>
            <path d="M15 7v10"></path>
          </svg>
          <span class="nav-label">Graph</span>
        </a>
      </div>
    </nav>
  </body>
</html>
