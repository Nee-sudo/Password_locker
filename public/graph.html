<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7b38f8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="https://img.icons8.com/?size=80&id=WzwD40yUyIpm&format=png" type="image/png">
  <title>Productivity Dashboard | Vault</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>
  :root {
    --bg-color: #0f172a;       /* Deep Navy Blue */
    --card-bg: #1e293b;       /* Slate Blue */
    --accent: #7b38f8;        /* Purple */
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    margin: 0;
    padding-bottom: 5rem;
    padding: 20px 20px 0 20px;
    background: var(--bg-color);
    color: var(--text-main);
    box-sizing: border-box;
    overflow-y: auto;
  }

  .header {
    max-width: 100%;

    width: 100%;
    max-width: 1400px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .controls {
    display: flex;
    gap: 8px;
    background: var(--card-bg);
    padding: 12px;
    flex-wrap: wrap;
    justify-content: center;

    border-radius: 12px;
    border: 1px solid #334155;
  }

  button {
    padding: 10px 18px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: 8px;
    font-weight: 600;
    font-size: 16px;
    min-width: 80px;

    transition: all 0.2s ease;
  }

  button:hover {
    color: var(--text-main);
    background: #334155;
  }

  button.active {
    background: var(--accent);
    color: #fff;
  }

  .chart-wrapper {
    height: 70vh;

    width: 100%;
    max-width: 1600px;
    flex-grow: 1;
    background: #f4f4f4; /* Matching the original "Inspirational" background */
    border-radius: 20px;
    padding: 25px;
    margin: 10px 0;

    border: 1px solid #334155;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    position: relative;
    box-sizing: border-box;
  }

  canvas {
    width: 100% !important;
    height: 100% !important;
  }

  h1 {
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    margin: 0;
    letter-spacing: -0.5px;
  }

  @media (max-width: 768px) {
    body {
      padding: 10px;
    }

    .header {
      flex-direction: column;
      gap: 15px;
    }

    .controls {
      gap: 8px;
    }

    .chart-wrapper {
      padding: 15px;
      border-radius: 16px;
      max-width: 100%;
    }
  }

  @media (max-width: 480px) {
    .controls {
      padding: 10px;
      gap: 4px;
    }

    button {
      font-size: 14px;
      padding: 10px 12px;
    }

    .chart-wrapper {
      padding: 10px;
      height: 65vh;
    }
  }

  /* Bottom Navigation Styles */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--card-bg);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border-top: 1px solid #334155;
    padding: 12px 20px;
  }

  .nav-container {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }

  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    border-radius: 12px;
    color: var(--text-dim);
    text-decoration: none;
    transition: all 0.2s ease;
    font-size: 12px;
    font-weight: 600;
  }

.nav-btn:hover {
    color: var(--text-main);
    background: rgba(123, 56, 248, 0.15);
    transform: scale(1.05) translateY(-1px);
    box-shadow: 0 4px 12px rgba(123, 56, 248, 0.3);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .nav-btn.active {
    background: var(--accent);
    color: #fff;
  }

  .nav-icon {
    width: 24px;
    height: 24px;
  }

  .nav-label {
    font-size: 10px;
    display: none;
  }

      /* Bottom Navigation from index.html */
      #bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background: rgba(255, 255, 255, 0.05);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 16px;
      }

      .nav-container {
        max-width: 6xl;
        margin: 0 auto;
        display: flex;
        justify-content: space-around;
        align-items: center;
      }

      .nav-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 12px;
        border-radius: 12px;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        transition: all 0.3s ease;
        font-size: 12px;
        font-weight: 500;
      }

      .nav-btn:hover {
        color: #f1f5f9;
        background: rgba(255, 255, 255, 0.1);
      }

      .nav-btn.active {
        color: #ec4899;
        background: rgba(255, 255, 255, 0.15);
        font-weight: 600;
      }

      .nav-btn.graph-active {
        color: #7b38f8;
        background: rgba(255, 255, 255, 0.15);
        font-weight: 600;
      }

      .nav-icon {
        width: 24px;
        height: 24px;
      }

      .nav-label {
        font-size: 10px;
        display: none;
      }

      @media (min-width: 768px) {
        .nav-label {
          display: block;
        }
      }

  @media (min-width: 768px) {
    .nav-label {
      display: block;
    }
  }

</style>

</head>

<body>
  <!-- Splash Screen -->
  <div id="splash" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-color);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-main);font-family:'Inter',sans-serif;text-align:center;padding:2rem;opacity:1;transition:opacity 0.5s ease-out;">
    <div style="width:80px;height:80px;border:3px solid var(--accent, #7b38f8);border-top:3px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:2rem;"></div>
    <h2 style="font-size:1.5rem;font-weight:700;margin:0 0 1rem 0;">Productivity Graph</h2>
    <div class="loading-bar" style="width:200px;height:4px;background:var(--card-bg);border-radius:2px;overflow:hidden;margin-bottom:1rem;">
      <div style="height:100%;background:var(--accent);width:0%;transition:width 0.1s ease;border-radius:2px;"></div>
    </div>
    <p style="opacity:0.8;font-size:0.9rem;">Loading data...</p>
  </div>

  <div id="main-content" style="opacity:0;transition:opacity 0.3s ease-in;">

<div class="header">
  <h1>Productivity <span style="color: var(--accent)">Challenge</span></h1>
  <div class="controls">
    <button onclick="updateView('daily', this)">Daily</button>
    <button onclick="updateView('weekly', this)">Weekly</button>
    <button onclick="updateView('monthly', this)">Monthly</button>
    <button onclick="updateView('yearly', this)">Yearly</button>
    <button onclick="updateView('lifetime', this)" class="active">Lifetime</button>
  </div>
</div>

<div class="chart-wrapper">
  <canvas id="heartbeatChart"></canvas>
</div>
<script>
const USER_ID = "elite_protocol_user_1";
const API_URL = location.hostname === "localhost"
  ? "http://localhost:5000"
  : "https://passwordlocker-vpq0.onrender.com";

let chart;
let fullData = { labels: [], score: [] };

// ✅ Safe fetch
async function loadData() {
  try {
    const res = await fetch(`${API_URL}/api/vault/${USER_ID}`);
    const data = await res.json();

    let labels = [];
    let score = [];
    let runningScore = 0;

    (data.passwords || []).forEach((entry) => {
      (entry.attempts || []).forEach((attempt) => {

        // ✅ Cleaner time format
        const date = new Date(attempt.time);
        const time = date.getHours() + ":" + String(date.getMinutes()).padStart(2, "0");

        runningScore += attempt.success ? 1 : -1;

        labels.push(time);
        score.push(runningScore);
      });
    });

    return { labels, score };

  } catch (err) {
    console.error("Graph load failed:", err);
    return { labels: ["No Data"], score: [0] };
  }
}

function updateView(range, btn) {
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let sliceCount;
  switch(range) {
    case 'daily': sliceCount = 10; break;
    case 'weekly': sliceCount = 50; break;
    case 'monthly': sliceCount = 100; break;
    default: sliceCount = fullData.labels.length;
  }

  chart.data.labels = fullData.labels.slice(-sliceCount);
  chart.data.datasets[0].data = fullData.score.slice(-sliceCount);
  chart.update();
}

// ✅ Splash handler (FIXED)
function fadeSplash() {
  const splash = document.getElementById("splash");
  const main = document.getElementById("main-content");

  splash.style.opacity = "0";
  main.style.opacity = "1";

  setTimeout(() => splash.remove(), 500);
}

// 🔥 Chart init
loadData().then(data => {
  fullData = data;

  const ctx = document.getElementById("heartbeatChart").getContext("2d");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: data.labels.length ? data.labels : ["Start"],
      datasets: [{
        label: "Discipline Score",
        data: data.score.length ? data.score : [0],
        borderColor: "#7b38f8",
        backgroundColor: "#7b38f8",
        fill: false,
        tension: 0.3,
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true },
        title: {
          display: true,
          text: "Discipline Performance",
          font: { size: 18 }
        }
      },
      scales: {
        x: {
          title: { display: true, text: "Attempts (Time)" }
        },
        y: {
          title: { display: true, text: "Score" },
          beginAtZero: true
        }
      }
    }
  });

  fadeSplash();
});
</script>

<script>
      // Bottom Nav Active State
      document.addEventListener("DOMContentLoaded", () => {
        const path = window.location.pathname;
        const vaultBtn = document.querySelector('#bottom-nav a[href="/"]');
        const graphBtn = document.querySelector('#bottom-nav a[href="/graph"]');
        if (path === "/") {
          vaultBtn?.classList.add("active");
        } else if (path === "/graph") {
          graphBtn?.classList.add("graph-active");
        }
      });
    </script>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <div class="nav-container">
        <a href="/" class="nav-btn">
          <svg
            class="nav-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span class="nav-label">Vault</span>
        </a>
        <a href="/graph" class="nav-btn">
          <svg
            class="nav-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 3v18h18V3H3z"></path>
            <path d="M12 9v8"></path>
            <path d="M9 11v6"></path>
            <path d="M15 7v10"></path>
          </svg>
          <span class="nav-label">Graph</span>
        </a>
      </div>
    </nav>

</body>
</html>
